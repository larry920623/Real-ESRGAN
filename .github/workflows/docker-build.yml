name: Build and Push Docker Image

# 觸發條件：當推送到 master 分支時
on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest # 使用 GitHub 提供的免費 Ubuntu 電腦

    steps:
      # 1. 下載你的程式碼
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 登入 Docker Hub (使用剛剛設定的 Secret)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. 設定 Docker Buildx (加速構建工具)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 開始 Build 並 Push 到 Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 這裡會自動標記版本： latest
          tags: ${{ secrets.DOCKER_USERNAME }}/real-esrgan:latest
          # 這裡使用快取，下次 Build 會更快
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/real-esrgan:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/real-esrgan:buildcache,mode=max